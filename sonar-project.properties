# To set up Sonar cloud follow https://github.com/DEFRA/cdp-documentation/blob/main/howto/sonarcloud.md
# Update properties in this file as per the howto instructions
# Uncomment properties in this .github/workflows/check-pull-request.yml
# Uncomment properties in this .github/workflows/publish.yml
# Uncomment properties in this .github/workflows/publish-hotfix.yml

sonar.projectKey=DEFRA_cads-mis
sonar.projectName=cads-mis
sonar.organization=defra

sonar.links.homepage=https://github.com/DEFRA/cads-mis
sonar.links.ci=https://github.com/DEFRA/cads-mis/actions
sonar.links.scm=https://github.com/DEFRA/cads-mis
sonar.links.issue=https://github.com/DEFRA/cads-mis/issues

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.inclusions=src/server/**
sonar.exclusions=**/*.test.*,src/server/server.js
sonar.tests=.
sonar.test.inclusions=src/server/**/*.test.*
sonar.cpd.exclusions=**/*.test.*
